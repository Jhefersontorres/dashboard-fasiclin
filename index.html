<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FASICLIN PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{font-family:Poppins;background:#f4f6f9;margin:0}
.container{padding:20px}
.card{background:#fff;padding:20px;border-radius:15px;margin-bottom:20px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.filters{display:flex;gap:10px;flex-wrap:wrap}
select{padding:10px;border-radius:10px}
.stats{display:flex;gap:20px}
.stat{flex:1;text-align:center;font-weight: 500;}
.stat p{font-size:28px;color:#299947}
canvas{max-height:350px}
</style>
</head>

<body>

<div class="container">

<div class="card filters">
<select id="proc"></select>
<select id="clinica"></select>
<select id="turma"></select>
<select id="mes"></select>
</div>

<div class="stats">
<div class="card stat">Total<p id="qtd">0</p></div>
<div class="card stat">Faturamento<p id="valor">0</p></div>
<div class="card stat">Eficiência<p id="meta">0%</p></div>
</div>

<div class="card"><canvas id="linha"></canvas></div>
<div class="card"><canvas id="barra"></canvas></div>
<div class="card"><canvas id="pizza"></canvas></div>

</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTV14Ylz2lkaCPJEyR7lJHHbVfO7qD4hGwTaqoCxHC8I1vIuwU_2X0idkNswPkO8tum1kmScpspHo5A/pub?output=csv";

let data=[],charts={};

window.onload=init;

async function init(){

const res = await fetch(URL);
const csv = await res.text();

const wb = XLSX.read(csv,{type:'string'});
const sheet = wb.Sheets[wb.SheetNames[0]];

data = XLSX.utils.sheet_to_json(sheet);

populateFilters();
update(data);
}

function populateFilters(){

fill("proc","PROCEDIMENTO");
fill("clinica","CLINICA");
fill("turma","TURMA");

let meses = [...new Set(data.map(r=>{
let d=parseDate(get(r,"DATA"));
return d?d.toLocaleString('pt-BR',{month:'short',year:'numeric'}):null;
}))];

setOptions("mes",meses);

document.querySelectorAll("select").forEach(s=>s.onchange=filter);
}

function fill(id,col){
let vals=[...new Set(data.map(r=>get(r,col)))];
setOptions(id,vals);
}

function setOptions(id,list){
let el=document.getElementById(id);
el.innerHTML='<option>TODOS</option>';
list.forEach(v=>v&&el.innerHTML+=`<option>${v}</option>`);
}

function filter(){

let f=data.filter(r=>{

let d=parseDate(get(r,"DATA"));
let mes = d?d.toLocaleString('pt-BR',{month:'short',year:'numeric'}):"";

return match("proc",get(r,"PROCEDIMENTO")) &&
match("clinica",get(r,"CLINICA")) &&
match("turma",get(r,"TURMA")) &&
match("mes",mes);

});

update(f);
}

function match(id,val){
let s=document.getElementById(id).value;
return s==="TODOS"||s===val;
}

function update(d){

let qtd=0,val=0;
let procMap={},clinMap={},dateMap={};

d.forEach(r=>{
let q=num(get(r,"QUANTIDADE"));
let v=num(get(r,"VALOR TOTAL"));
let p=get(r,"PROCEDIMENTO");
let c=get(r,"CLINICA");

qtd+=q;
val+=v;

procMap[p]=(procMap[p]||0)+v;
clinMap[c]=(clinMap[c]||0)+q;

let dt=parseDate(get(r,"DATA"));
if(dt){
let key=dt.toLocaleDateString();
dateMap[key]=(dateMap[key]||0)+q;
}
});

document.getElementById("qtd").innerText=qtd;
document.getElementById("valor").innerText=val.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
document.getElementById("meta").innerText=d.length?Math.round(qtd/(d.length*40)*100)+'%':'0%';

renderCharts(procMap,clinMap,dateMap);
}

function renderCharts(proc,clin,date){

Object.values(charts).forEach(c=>c.destroy());

charts.linha=new Chart(linha,{
type:'line',
data:{labels:Object.keys(date),datasets:[{data:Object.values(date),borderColor:'#299947'}]}
});

charts.barra=new Chart(barra,{
type:'bar',
data:{labels:Object.keys(proc),datasets:[{data:Object.values(proc),backgroundColor:'#299947'}]}
});

charts.pizza=new Chart(pizza,{
type:'doughnut',
data:{labels:Object.keys(clin),datasets:[{data:Object.values(clin)}]}
});
}

function get(r,l){
let k=Object.keys(r).find(k=>k.toUpperCase().includes(l));
return k?r[k]:"";
}

function num(v){
return parseFloat(v?.toString().replace(/[R$.\s]/g,'').replace(',','.'))||0;
}

function parseDate(v){
let p=v.split('/');
return p.length===3?new Date(p[2],p[1]-1,p[0]):new Date(v);
}

</script>

</body>
</html>
