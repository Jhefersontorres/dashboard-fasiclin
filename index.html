<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FASICLIN - Gestão Premium</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root{
--green:#299947;
--gray:#a395a8;
--bg:#f4f6f8;
}

body{
font-family:Arial;
background:var(--bg);
margin:0;
}

header{
background:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.container{
padding:20px;
}

.card{
background:#fff;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.btn{
background:var(--green);
color:#fff;
border:none;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
}

select{
padding:10px;
border-radius:20px;
width:100%;
}

.stats{
display:flex;
gap:20px;
}

.stat{
flex:1;
text-align:center;
font-size:20px;
}

canvas{
max-height:400px;
}
</style>
</head>

<body>

<header>
<h2>FASICLIN Dashboard</h2>
<button class="btn" onclick="fetchData()">Atualizar</button>
</header>

<div class="container">

<div class="card">
<select id="procSelect" onchange="filterData()">
<option value="TODOS">Todos</option>
</select>
</div>

<div class="stats">
<div class="card stat">Qtd: <span id="qtd">0</span></div>
<div class="card stat">R$: <span id="valor">0</span></div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/1M2TGuEkzyOXgcxGK9ujYDknIgjvWlveHHsSpqnvv5j4/export?format=csv&gid=1575732509";

let dataGlobal = [];
let chart;

async function fetchData(){
const res = await fetch(URL);
const text = await res.text();

const wb = XLSX.read(text,{type:'string'});
const ws = wb.Sheets[wb.SheetNames[0]];
dataGlobal = XLSX.utils.sheet_to_json(ws);

populate();
update(dataGlobal);
}

function populate(){
let select = document.getElementById('procSelect');
let procs = [...new Set(dataGlobal.map(r=>r.PROCEDIMENTO))];

select.innerHTML='<option value="TODOS">Todos</option>';

procs.forEach(p=>{
select.innerHTML += `<option>${p}</option>`;
});
}

function filterData(){
let p = document.getElementById('procSelect').value;

let f = dataGlobal.filter(r=>{
return p==="TODOS" || r.PROCEDIMENTO===p;
});

update(f);
}

function update(data){

let qtd=0;
let val=0;
let map={};

data.forEach(r=>{
let q = Number(r.QUANTIDADE)||0;
let v = Number(r["VALOR TOTAL"])||0;

qtd+=q;
val+=v;

map[r.PROCEDIMENTO]=(map[r.PROCEDIMENTO]||0)+v;
});

document.getElementById('qtd').innerText=qtd;
document.getElementById('valor').innerText=val.toFixed(2);

let labels=Object.keys(map);
let values=Object.values(map);

if(chart) chart.destroy();

chart=new Chart(document.getElementById('chart'),{
type:'bar',
data:{labels,datasets:[{data:values}]}
});
}

fetchData();

</script>

</body>
</html>
