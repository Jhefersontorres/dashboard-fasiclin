<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FASICLIN • Gestão Inteligente</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #f5f6fa;
    padding: 20px;
}

h1 {
    margin-bottom: 20px;
}

.filtros {
    margin-bottom: 20px;
}

select, button {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-right: 10px;
}

button {
    background: green;
    color: white;
    cursor: pointer;
}

.cards {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.card {
    background: white;
    flex: 1;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.valor {
    font-size: 28px;
    color: green;
}

.graficos {
    display: flex;
    gap: 20px;
}

canvas {
    background: white;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>FASICLIN • Gestão Inteligente</h1>

<div class="filtros">
    <select id="filtroProcedimento"></select>

    <button onclick="filtrarMes('todos')">Todos os Meses</button>
    <button onclick="filtrarMes('02')">Fev</button>
    <button onclick="filtrarMes('03')">Mar</button>
</div>

<div class="cards">
    <div class="card">
        <h3>Total</h3>
        <div id="total" class="valor">0</div>
    </div>

    <div class="card">
        <h3>Faturamento</h3>
        <div id="faturamento" class="valor">R$ 0</div>
    </div>

    <div class="card">
        <h3>Eficiência</h3>
        <div id="eficiencia" class="valor">0%</div>
    </div>
</div>

<div class="graficos">
    <canvas id="grafico1"></canvas>
    <canvas id="grafico2"></canvas>
</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTV14Ylz2lkaCPJEyR7lJHHbVfO7qD4hGwTaqoCxHC8I1vIuwU_2X0idkNswPkO8tum1kmScpspHo5A/pub?output=csv";

let dados = [];
let mesSelecionado = "todos";

async function carregarDados() {
    try {
        const res = await fetch(URL);
        const texto = await res.text();

        const linhas = texto.split("\n");

        // REMOVE CABEÇALHO
        linhas.shift();

        dados = linhas.map(linha => {
            // REGEX PROFISSIONAL PRA CSV (resolve vírgula em valores)
            const col = linha.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);

            if (!col || col.length < 4) return null;

            let data = (col[0] || "").replace(/"/g, "").trim();
            let procedimento = (col[1] || "").replace(/"/g, "").trim();
            let quantidade = parseFloat((col[2] || "0").replace(",", ".")) || 0;

            let valorRaw = (col[3] || "")
                .replace(/"/g, "")
                .replace("R$", "")
                .replace(/\./g, "")
                .replace(",", ".")
                .trim();

            let valor = parseFloat(valorRaw) || 0;

            return { data, procedimento, quantidade, valor };

        }).filter(d => d && d.procedimento);

        console.log("🔥 Dados tratados:", dados);

        montarFiltro();
        atualizar();

    } catch (e) {
        alert("Erro ao carregar dados");
        console.error(e);
    }
}

function montarFiltro() {
    const select = document.getElementById("filtroProcedimento");

    const procedimentos = [...new Set(dados.map(d => d.procedimento))];

    select.innerHTML = '<option value="todos">Todos</option>';

    procedimentos.forEach(p => {
        select.innerHTML += `<option value="${p}">${p}</option>`;
    });

    select.onchange = atualizar;
}

function filtrarMes(mes) {
    mesSelecionado = mes;
    atualizar();
}

function atualizar() {
    const proc = document.getElementById("filtroProcedimento").value;

    let filtrados = dados.filter(d => {

        let okProc = proc === "todos" || d.procedimento === proc;

        let okMes = true;
        if (mesSelecionado !== "todos") {
            if (!d.data.includes("/")) return false;
            okMes = d.data.split("/")[1] === mesSelecionado;
        }

        return okProc && okMes;
    });

    console.log("📊 Filtrados:", filtrados);

    let total = filtrados.reduce((s, d) => s + d.quantidade, 0);
    let faturamento = filtrados.reduce((s, d) => s + d.valor, 0);

    document.getElementById("total").innerText = total;
    document.getElementById("faturamento").innerText = "R$ " + faturamento.toFixed(2);

    let eficiencia = total > 0 ? (faturamento / total) : 0;
    document.getElementById("eficiencia").innerText = (eficiencia * 100).toFixed(1) + "%";

    gerarGraficos(filtrados);
}

let grafico1, grafico2;

function gerarGraficos(dados) {
    let mapa = {};

    dados.forEach(d => {
        mapa[d.procedimento] = (mapa[d.procedimento] || 0) + d.valor;
    });

    const labels = Object.keys(mapa);
    const valores = Object.values(mapa);

    if (grafico1) grafico1.destroy();

    grafico1 = new Chart(document.getElementById("grafico1"), {
        type: "bar",
        data: {
            labels,
            datasets: [{
                label: "Faturamento",
                data: valores
            }]
        }
    });

    if (grafico2) grafico2.destroy();

    grafico2 = new Chart(document.getElementById("grafico2"), {
        type: "pie",
        data: {
            labels,
            datasets: [{
                data: valores
            }]
        }
    });
}

carregarDados();

</script>

</body>
</html>
